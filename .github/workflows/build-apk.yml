name: Build & Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Build static export
        run: |
          # Temporarily move API routes (not compatible with static export)
          if [ -d "src/app/api" ]; then
            mv src/app/api src/app/_api_backup
          fi
          BUILD_TARGET=apk bun run build
          if [ -d "src/app/_api_backup" ]; then
            mv src/app/_api_backup src/app/api
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "Маленькие Истории ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 📱 Автоматическая сборка ${{ steps.version.outputs.VERSION }}

            Скачайте APK и установите на Android-устройство.

            ### Установка
            1. Скачайте `app-debug.apk`
            2. Разрешите установку из неизвестных источников
            3. Установите приложение

            ### Озвучка
            Встроенная нейронная озвучка (Microsoft Edge Neural TTS, голос Светлана) — работает офлайн, без интернета и установки дополнительных компонентов.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
